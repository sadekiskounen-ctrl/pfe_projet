_schema-version: "3.1"
ID: gestion-pme
version: 1.0.0
description: Solution Cloud Gestion Clients & Fournisseurs PME/Startups — SAP BTP
# Region: US10-001 | Org: ffbe6148trial | Space: dev

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npm run frontend:install
        - npm run frontend:build
        - npx cds build --production
        - node scripts/build-cloud.js

modules:
  # ── Backend CAP Service ──
  - name: gestion-pme-srv
    type: nodejs
    path: gen/backend/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 768M
    requires:
      - name: gestion-pme-db
      - name: gestion-pme-auth
      - name: gestion-pme-dest
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── Database Deployer ──
  - name: gestion-pme-db-deployer
    type: hdb
    path: gen/backend/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: gestion-pme-db

  # ── Approuter ──
  - name: gestion-pme-approuter
    type: approuter.nodejs
    path: frontend
    parameters:
      memory: 256M
      disk-quota: 1024M
      keep-existing-routes: true
      routes:
        - route: "client-pme-5ad225cetrial.${default-domain}"
        - route: "admin-pme-5ad225cetrial.${default-domain}"
    properties:
      TENANT_HOST_PATTERN: "^(.*).cfapps.us10-001.hana.ondemand.com"
    requires:
      - name: gestion-pme-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  # ── SAP Build Apps Destination Content ──
  - name: gestion-pme-dest-content
    type: com.sap.application.content
    requires:
      - name: gestion-pme-dest
        parameters:
          content-target: true
      - name: gestion-pme-auth
        parameters:
          service-key:
            name: gestion-pme-auth-key
      - name: srv-api
    parameters:
      content:
        instance:
          destinations:
            - Name: gestion-pme-api
              Description: Backend API for SAP Build Apps
              Authentication: OAuth2UserTokenExchange
              TokenServiceInstanceName: gestion-pme-auth
              TokenServiceKeyName: gestion-pme-auth-key
              URL: ~{srv-api/srv-url}
              sap.cloud.service: gestion-pme
              sap.applicationdevelopment.actions.enabled: true
              sap.build.usage: odata_gen
              HTML5.DynamicDestination: true
              WebIDEEnabled: true
              WebIDEUsage: odata_gen
          existing_destinations_policy: update
    build-parameters:
      no-source: true

resources:
  # ── Instance HANA HDI Container gérée ──
  - name: gestion-pme-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── Nouvelle instance XSUAA dédiée avec nos rôles ──
  - name: gestion-pme-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./backend/xs-security.json
      config:
        xsappname: gestion-pme
        tenant-mode: dedicated

  # ── Réutilise le Destination Service existant ──
  - name: gestion-pme-dest
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: Destination-Service

  # ── Réutilise l'HTML5 App Repository existant ──
  - name: gestion-pme-html5-repo-rt
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: HTML5-APP


