<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — SAP Fiori</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sap-bg: #eff4f9;
            --sap-primary: #0070f2;
            --sap-text: #32363a;
            --sap-border: #d8d8d8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sap-bg);
            background-image: linear-gradient(180deg, #354a5f 0%, #eff4f9 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .sap-logo {
            width: 80px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.25rem;
            color: var(--sap-text);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--sap-text-light);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--sap-border);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--sap-primary);
            box-shadow: 0 0 0 2px rgba(0, 112, 242, 0.2);
        }

        .btn-login {
            width: 100%;
            background-color: var(--sap-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6a6d70;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg" class="sap-logo" alt="SAP">
    <h1>Connectez-vous</h1>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Utilisateur</label>
            <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">Connexion</button>
    </form>

    <div class="footer">
        SAP BTP Cloud Foundry · Gestion PME v1.0
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        if(user === 'admin') {
            window.location.href = 'dashboard.html?user=admin';
        } else {
            alert('Utilisateur non autorisé pour ce rôle.');
        }
    });
</script>

</body>
</html>
