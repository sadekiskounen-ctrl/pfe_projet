<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PME Connect | Accueil</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; }
        h1 { color: #0070f2; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        .btn { display: block; padding: 15px; margin: 10px 0; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-admin { background: #1d2d3e; color: white; }
        .btn-reg { background: #0070f2; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div style="margin-bottom: 20px;">
            <img src="https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg" alt="SAP Logo" style="width: 80px;">
        </div>
        <h1>PME Connect</h1>
        <p>Bienvenue sur votre plateforme de gestion. Choisissez un espace pour commencer :</p>
        
        <a href="/auth.html" class="btn" style="background: #4ade80; color: #1d2d3e; margin-bottom: 20px;">🔑 Connexion (Compte existant)</a>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        
        <a href="/admin/dashboard.html" class="btn btn-admin">💻 Accéder au Dashboard Admin</a>
        <a href="/registration/index.html" class="btn btn-reg">📝 Inscription Nouveau Partenaire</a>
        
        <div style="margin-top: 20px; font-size: 12px; color: #94a3b8;">
            Statut du serveur : <span style="color: #22c55e;">● Connecté</span>
        </div>
    </div>
</body>
</html>
