name: CI/CD — Gestion PME SAP BTP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  CF_API: 'https://api.cf.us10-001.hana.ondemand.com'
  CF_ORG: 'ffbe6148trial'

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate CDS models
        run: npx cds compile backend/db/index.cds --to json > /dev/null
        continue-on-error: false

  # ── Job 2: Deploy to Development ────────────────────────────
  deploy-dev:
    name: Deploy to Dev (BTP)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      CF_USERNAME: ${{ secrets.CF_USERNAME }}
      CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
      CF_SPACE: ${{ secrets.CF_SPACE_DEV }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MBT & CF CLI
        run: |
          npm install -g mbt
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github" | tar -zx
          ./cf install-plugin -f https://github.com/cloudfoundry-incubator/multiapps-cli-plugin/releases/latest/download/multiapps-plugin.linux64
          ./cf plugins

      - name: Login to SAP BTP Cloud Foundry
        run: |
          ./cf api ${{ env.CF_API }}
          ./cf auth $CF_USERNAME $CF_PASSWORD
          ./cf target -o ${{ env.CF_ORG }} -s $CF_SPACE

      - name: Deploy to Development Space
        run: ./cf deploy mta_archives/gestion-pme-dev.mtar --retries 1 -f

  # ── Job 3: Deploy to Production ─────────────────────────────
  deploy-prod:
    name: Deploy to Production (BTP)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CF_USERNAME: ${{ secrets.CF_USERNAME }}
      CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
      CF_SPACE: ${{ secrets.CF_SPACE_PROD }}
      CF_DOMAIN: ${{ secrets.CF_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MBT & CF CLI
        run: |
          npm install -g mbt
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github" | tar -zx
          ./cf install-plugin -f https://github.com/cloudfoundry-incubator/multiapps-cli-plugin/releases/latest/download/multiapps-plugin.linux64
          ./cf plugins

      - name: Login to SAP BTP Cloud Foundry
        run: |
          ./cf api ${{ env.CF_API }}
          ./cf auth $CF_USERNAME $CF_PASSWORD
          ./cf target -o ${{ env.CF_ORG }} -s $CF_SPACE

      - name: Blue-Green Deploy to Production
        run: ./cf deploy mta_archives/gestion-pme_1.0.0.mtar --strategy rolling -f
